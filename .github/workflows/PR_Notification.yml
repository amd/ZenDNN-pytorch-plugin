name: PR Status Notification (ZenTorch)
on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  checks: read
  pull-requests: read
  contents: read
  actions: read

jobs:
  notify_teams:
    runs-on: amd-zenai-arc-xsmall-dind
    timeout-minutes: 120
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Get PR Info
        id: pr_info
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            return {
              number: pr.number,
              title: pr.title,
              url: pr.html_url,
              head_sha: pr.head.sha,
              author: pr.user.login,
              created_at: pr.created_at
            };

      - name: Monitor All Checks
        id: monitor_checks
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.ZIAIE_PAT }}
          script: |
            const pr = JSON.parse(`${{ steps.pr_info.outputs.result }}`);

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = pr.head_sha;

            console.log(`🔍 Monitoring checks for PR #${pr.number} (commit: ${ref.substring(0, 7)})`);

            // ✅ EXCLUSION LIST - Remove specific checks and notification workflows
            const excludedChecks = [
              'pr-notification',
              'pr_notification',
              'notify',
              'notification',
              'check-commit-messages',
              'intelligent analysis',
              'intelligence'
            ];

            const isExcluded = (name) => {
              const lowerName = name.toLowerCase();
              return excludedChecks.some(excluded => lowerName.includes(excluded));
            };

            // Turn noisy workflow-run names like "PR #542" or "Code Quality: PR #542"
            // into something a human recognizes (e.g. "CodeQL", "Code Quality").
            const prettifyRunName = (run) => {
              let n = (run.name || '').trim();
              // Strip trailing "PR #123" / ": PR #123" / "- PR #123" decorations
              n = n.replace(/[\s:_\-\u2013\u2014]*PR\s*#?\d+\s*$/i, '').trim();
              // If nothing meaningful is left, derive a name from the workflow file
              const uninformative = n === '' || /^#?\d+$/.test(n) || (pr.title && n === pr.title.trim());
              if (uninformative) {
                const base = (run.path || '').split('/').pop() || '';
                n = base.replace(/\.ya?ml$/i, '').replace(/[-_]+/g, ' ').trim();
                n = n ? n.replace(/\b\w/g, c => c.toUpperCase()) : `Workflow ${run.workflow_id || run.id}`;
                n = n.replace(/\bCodeql\b/g, 'CodeQL').replace(/\bCi\b/g, 'CI');
              }
              return n;
            };

            const getAllChecks = async () => {
              const allChecks = [];

              // Case-insensitive de-duplication.
              const addCheck = (name, status, url) => {
                if (!name) return;
                const key = name.trim().toLowerCase();
                if (allChecks.some(c => c.name.trim().toLowerCase() === key)) return;
                allChecks.push({ name: name.trim(), status, url, type: 'local' });
              };

              try {
                console.log(`📊 Getting all checks for commit ${ref.substring(0, 7)}...`);

                // 1) Workflow runs (parent level). Their conclusion is the aggregate of
                //    all their jobs, so we report at this level and hide the child jobs.
                const workflowResp = await github.rest.actions.listWorkflowRunsForRepo({
                  owner, repo, head_sha: ref, per_page: 100
                });
                console.log(`   Found ${workflowResp.data.workflow_runs.length} workflow runs`);
                const includedRuns = workflowResp.data.workflow_runs.filter(run => {
                  if (run.id === context.runId || isExcluded(run.name)) {
                    console.log(`   Excluding: ${run.name}`);
                    return false;
                  }
                  return true;
                });

                // Collect the job names belonging to those runs so we can hide job-level
                // checks (e.g. "build") and show the workflow instead (e.g. "ZenDNN PYTORCH CI").
                const jobNames = new Set();
                for (const run of includedRuns) {
                  try {
                    const jobsResp = await github.rest.actions.listJobsForWorkflowRun({
                      owner, repo, run_id: run.id, per_page: 100
                    });
                    jobsResp.data.jobs.forEach(j => jobNames.add((j.name || '').trim().toLowerCase()));
                  } catch (e) {
                    console.log(`   (could not list jobs for run ${run.id}: ${e.message})`);
                  }
                }

                // Add workflow runs first (aggregate status wins over any same-named check)
                includedRuns.forEach(run => {
                  addCheck(prettifyRunName(run), run.conclusion || run.status, run.html_url);
                });

                // 2) Check runs — skip anything that is a job of a workflow run above
                const checkResp = await github.rest.checks.listForRef({
                  owner, repo, ref, per_page: 100
                });
                console.log(`   Found ${checkResp.data.check_runs.length} check runs`);
                checkResp.data.check_runs.forEach(check => {
                  if (isExcluded(check.name)) {
                    console.log(`   Excluding check: ${check.name}`);
                    return;
                  }
                  if (jobNames.has((check.name || '').trim().toLowerCase())) {
                    console.log(`   Hiding job-level check (shown at workflow level): ${check.name}`);
                    return;
                  }
                  addCheck(check.name, check.conclusion || check.status, check.html_url);
                });

                // 3) Commit status checks
                const statusResp = await github.rest.repos.getCombinedStatusForRef({
                  owner, repo, ref
                });
                console.log(`   Found ${statusResp.data.statuses.length} status checks`);
                statusResp.data.statuses.forEach(status => {
                  if (isExcluded(status.context)) {
                    console.log(`   Excluding status: ${status.context}`);
                    return;
                  }
                  addCheck(status.context, status.state, status.target_url);
                });

                console.log(`📋 Total checks collected: ${allChecks.length}`);
                return allChecks;

              } catch (error) {
                console.log(`❌ Error getting checks: ${error.message}`);
                return [];
              }
            };

            // Initial wait for checks to start
            console.log('⏳ Waiting 3 minutes for all checks to start...');
            await new Promise(resolve => setTimeout(resolve, 180000));

            let checks = await getAllChecks();
            let attempts = 0;
            const maxAttempts = 90; // 90 minutes max wait for builds

            console.log(`\n🔄 Starting monitoring loop...`);

            // Wait for completion
            while (attempts < maxAttempts) {
              const running = checks.filter(c =>
                ['in_progress', 'queued', 'pending', 'waiting', 'requested'].includes(c.status)
              );

              const completed = checks.filter(c =>
                ['success', 'failure', 'cancelled', 'skipped', 'neutral', 'error'].includes(c.status)
              );

              console.log(`\n📊 Status Summary (attempt ${attempts + 1}):`);
              console.log(`   ✅ Completed: ${completed.length}`);
              console.log(`   ⏳ Running: ${running.length}`);
              console.log(`   📊 Total: ${checks.length}`);

              if (running.length === 0) {
                console.log(`\n🎉 All ${checks.length} checks completed after ${attempts} minutes!`);
                break;
              }

              console.log(`\n⏳ Still waiting for:`);
              running.forEach(c => console.log(`   🔄 ${c.name}: ${c.status}`));

              attempts++;
              if (attempts >= maxAttempts) {
                console.log(`\n⏰ Timeout after ${maxAttempts} minutes - forcing completion`);
                break;
              }

              await new Promise(resolve => setTimeout(resolve, 60000)); // Wait 1 minute
              checks = await getAllChecks();
            }

            const finalRunning = checks.filter(c =>
              ['in_progress', 'queued', 'pending', 'waiting', 'requested'].includes(c.status)
            ).length;

            return {
              checks,
              total: checks.length,
              completed_in_minutes: attempts,
              still_running: finalRunning
            };

      - name: Send Teams Notification
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.ZENTORCH_WEBHOOK_URL }}
        run: |
          pr_json='${{ steps.pr_info.outputs.result }}'
          checks_json='${{ steps.monitor_checks.outputs.result }}'
          REPO="${{ github.repository }}"

          echo "📤 Building Teams notification for ZenTorch PR..."

          PR_NUMBER=$(echo "$pr_json" | jq -r '.number')
          PR_TITLE=$(echo "$pr_json" | jq -r '.title')
          PR_URL=$(echo "$pr_json" | jq -r '.url')
          PR_AUTHOR=$(echo "$pr_json" | jq -r '.author')
          HEAD_SHA_FULL=$(echo "$pr_json" | jq -r '.head_sha')
          HEAD_SHA=$(echo "$HEAD_SHA_FULL" | cut -c1-7)

          CHECKS=$(echo "$checks_json" | jq -c '.checks // []')
          TOTAL_COUNT=$(echo "$checks_json" | jq -r '.total // 0')
          COMPLETION_TIME=$(echo "$checks_json" | jq -r '.completed_in_minutes // 0')
          STILL_RUNNING=$(echo "$checks_json" | jq -r '.still_running // 0')

          # Count statuses
          SUCCESS_COUNT=$(echo "$CHECKS" | jq '[.[]|select(.status=="success")]|length')
          FAILED_COUNT=$(echo "$CHECKS" | jq '[.[]|select(.status=="failure")]|length')
          CANCELLED_COUNT=$(echo "$CHECKS" | jq '[.[]|select(.status=="cancelled")]|length')
          SKIPPED_COUNT=$(echo "$CHECKS" | jq '[.[]|select(.status=="skipped")]|length')
          NEUTRAL_COUNT=$(echo "$CHECKS" | jq '[.[]|select(.status=="neutral")]|length')
          ERROR_COUNT=$(echo "$CHECKS" | jq '[.[]|select(.status=="error")]|length')
          PENDING_COUNT=$(echo "$CHECKS" | jq '[.[]|select(.status=="in_progress" or .status=="pending" or .status=="queued" or .status=="waiting")]|length')

          echo "📊 ZenTorch PR Statistics:"
          echo "   Total: $TOTAL_COUNT checks"
          echo "   Success: $SUCCESS_COUNT, Failed: $FAILED_COUNT, Skipped: $SKIPPED_COUNT"
          echo "   Completion time: ${COMPLETION_TIME}m, Still running: $STILL_RUNNING"

          # Overall status + MessageCard theme color (this webhook renders the legacy
          # Office 365 "MessageCard" format, NOT Adaptive Cards).
          if [ "$FAILED_COUNT" -gt 0 ] || [ "$ERROR_COUNT" -gt 0 ]; then
            ICON="🔴"; STATUS="❌ SOME CHECKS FAILED"; THEME="D93F0B"
          elif [ "$PENDING_COUNT" -gt 0 ]; then
            ICON="🟡"; STATUS="⏳ CHECKS STILL RUNNING"; THEME="F2C744"
          elif [ "$CANCELLED_COUNT" -gt 0 ]; then
            ICON="🟠"; STATUS="🟠 SOME CHECKS CANCELLED"; THEME="F2A100"
          else
            ICON="🟢"; STATUS="✅ ALL CHECKS PASSED"; THEME="2EB67D"
          fi

          # Completion message
          if [ "$STILL_RUNNING" -gt 0 ]; then
            COMPLETION_MSG="All $TOTAL_COUNT workflows completed in ${COMPLETION_TIME}m (${STILL_RUNNING} still running)"
          else
            COMPLETION_MSG="All $TOTAL_COUNT workflows completed in ${COMPLETION_TIME}m"
          fi

          FALLBACK_URL="https://github.com/${REPO}/pull/${PR_NUMBER}/checks"

          # Build check list as markdown (safe escaping via jq). Each row: emoji [name](url) — STATUS
          echo "🔨 Building filtered check list..."
          CHECKS_MD=$(echo "$CHECKS" | jq -r --arg fallback "$FALLBACK_URL" '
            [ .[] as $c
              | ($c.status | ascii_upcase) as $s
              | (if   $s=="SUCCESS"   then "✅"
                 elif $s=="FAILURE"   then "❌"
                 elif $s=="CANCELLED" then "🟠"
                 elif $s=="SKIPPED"   then "⏭️"
                 elif $s=="ERROR"     then "❌"
                 elif $s=="NEUTRAL"   then "⚪"
                 else "🔄" end) as $emoji
              | (if ($c.url==null or $c.url=="") then $fallback else $c.url end) as $url
              | $emoji + " [" + $c.name + "](" + $url + ") — **" + $s + "**"
            ] | join("\n\n")')
          [ -z "$CHECKS_MD" ] && CHECKS_MD="_No checks found for this commit._"

          # Assemble a legacy MessageCard with jq so it is ALWAYS valid JSON
          echo "🔨 Creating Teams MessageCard..."
          jq -n \
            --arg summary "ZenTorch PR #$PR_NUMBER status" \
            --arg theme "$THEME" \
            --arg title "$ICON ZenTorch PR #$PR_NUMBER — $PR_TITLE" \
            --arg status "$STATUS" \
            --arg author "$PR_AUTHOR" --arg sha "$HEAD_SHA" --arg msg "$COMPLETION_MSG" \
            --arg total "$TOTAL_COUNT" --arg passed "$SUCCESS_COUNT" --arg failed "$FAILED_COUNT" \
            --arg cancelled "$CANCELLED_COUNT" --arg skipped "$SKIPPED_COUNT" \
            --arg checksmd "$CHECKS_MD" \
            --arg prurl "$PR_URL" --arg checksurl "$FALLBACK_URL" \
            --arg commiturl "https://github.com/${REPO}/commit/${HEAD_SHA_FULL}" '
            {
              "@type": "MessageCard",
              "@context": "http://schema.org/extensions",
              summary: $summary,
              themeColor: $theme,
              title: $title,
              sections: [
                {
                  activityTitle: $status,
                  facts: [
                    {name:"Repository:",      value:"ZenDNN_PyTorch_Plugin"},
                    {name:"Author:",          value:$author},
                    {name:"Commit:",          value:$sha},
                    {name:"Status:",          value:$msg},
                    {name:"Total Workflows:", value:$total},
                    {name:"✅ Passed:",        value:$passed},
                    {name:"❌ Failed:",        value:$failed},
                    {name:"🟠 Cancelled:",     value:$cancelled},
                    {name:"⏭️ Skipped:",       value:$skipped}
                  ],
                  markdown: true
                },
                {
                  title: "All PR Checks:",
                  text: $checksmd,
                  markdown: true
                }
              ],
              potentialAction: [
                {"@type":"OpenUri", name:"View PR",         targets:[{os:"default", uri:$prurl}]},
                {"@type":"OpenUri", name:"View All Checks", targets:[{os:"default", uri:$checksurl}]},
                {"@type":"OpenUri", name:"View Commit",     targets:[{os:"default", uri:$commiturl}]}
              ]
            }' > card.json

          echo "🔎 Validating card JSON..."
          jq empty card.json || { echo "❌ Invalid card JSON"; cat card.json; exit 1; }

          echo "📤 Sending ZenTorch Teams notification..."
          HTTP_CODE=$(curl -s -o resp.txt -w "%{http_code}" -H "Content-Type: application/json" -d @card.json "$TEAMS_WEBHOOK_URL")
          echo "HTTP $HTTP_CODE"
          cat resp.txt || true
          echo ""

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ ZenTorch Teams notification sent successfully!"
          else
            echo "❌ Failed to send ZenTorch Teams notification"
            exit 1
          fi

          echo "🎉 ZenTorch PR notification workflow completed successfully!"
